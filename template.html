<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALBA | K-Pop en Español</title>
  <meta name="description" content="ALBA Magazine - Tu fuente de noticias K-Pop en español. Música, estilo, cultura y conciertos en vivo.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
      background: #fff;
    }

    a { color: #333; text-decoration: none; }
    a:hover { color: #e67e22; }
    img { display: block; max-width: 100%; height: auto; }
    ul, ol { list-style: none; }

    /* ===== ORANGE TOP BORDER ===== */
    .top-bar {
      height: 3px;
      background: #e67e22;
    }

    /* ===== HEADER ===== */
    .site-header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .site-logo {
      font-family: Georgia, serif;
      font-weight: bold;
      font-size: 28px;
      letter-spacing: 0.08em;
      color: #e67e22;
    }

    .site-logo a { color: #e67e22; }

    .nav-links {
      display: flex;
      gap: 0;
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 18px 14px;
      color: #333;
    }

    .nav-links a:hover { color: #e67e22; }

    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      flex-direction: column;
      gap: 4px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: #333;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ===== SECTION TITLES ===== */
    .section-title {
      font-family: Georgia, serif;
      font-weight: bold;
      font-size: 22px;
      color: #333;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e67e22;
      display: inline-block;
    }

    /* ===== HERO ===== */
    .hero-section {
      padding: 24px 0 32px;
    }

    .hero-card {
      display: block;
      position: relative;
      overflow: hidden;
      border: 1px solid #ddd;
      border-radius: 2px;
    }

    .hero-card img {
      width: 100%;
      height: auto;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 32px 24px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 70%, transparent 100%);
    }

    .hero-overlay .category-badge {
      display: inline-block;
      background: #e67e22;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 10px;
      border-radius: 1px;
      margin-bottom: 10px;
    }

    .hero-overlay h2 {
      font-family: Georgia, serif;
      font-weight: bold;
      font-size: 26px;
      line-height: 1.3;
      color: #fff;
      margin-bottom: 8px;
      max-width: 600px;
    }

    .hero-overlay .hero-meta {
      display: flex;
      gap: 12px;
      color: rgba(255,255,255,0.65);
      font-size: 12px;
    }

    /* ===== LATEST ARTICLES ===== */
    .latest-section {
      padding: 0 0 32px;
    }

    .latest-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .latest-card {
      display: flex;
      border: 1px solid #ddd;
      border-radius: 2px;
      overflow: hidden;
      background: #fff;
    }

    .latest-card:hover { border-color: #e67e22; }

    .latest-card .color-bar {
      width: 4px;
      flex-shrink: 0;
    }

    .latest-card .card-content {
      padding: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .latest-card .card-category {
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .latest-card h3 {
      font-family: Georgia, serif;
      font-size: 14px;
      font-weight: bold;
      line-height: 1.35;
      color: #333;
      flex: 1;
      margin-bottom: 8px;
    }

    .latest-card .card-meta {
      font-size: 11px;
      color: #999;
    }

    .latest-card .card-thumb {
      width: 110px;
      flex-shrink: 0;
    }

    .latest-card .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== MUSICA SECTION ===== */
    .music-section {
      padding: 32px 0;
      background: #f9f9f9;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
    }

    .music-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .music-card {
      display: block;
      border: 1px solid #ddd;
      border-radius: 2px;
      overflow: hidden;
      background: #fff;
    }

    .music-card:hover { border-color: #e67e22; }

    .music-card .thumb {
      aspect-ratio: 16/9;
      overflow: hidden;
      position: relative;
    }

    .music-card .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .music-card .thumb .waveform-bar { display: none; }

    .music-card .card-body {
      padding: 14px;
    }

    .music-card .card-category {
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #e67e22;
      margin-bottom: 6px;
    }

    .music-card h3 {
      font-family: Georgia, serif;
      font-size: 16px;
      font-weight: bold;
      line-height: 1.3;
      color: #333;
      margin-bottom: 6px;
    }

    .music-card .card-meta {
      font-size: 11px;
      color: #999;
    }

    /* ===== CULTURA SECTION ===== */
    .culture-section {
      padding: 32px 0;
    }

    .culture-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .culture-card {
      display: block;
      position: relative;
      border: 1px solid #ddd;
      border-radius: 2px;
      overflow: hidden;
    }

    .culture-card:first-child {
      grid-row: 1 / 3;
    }

    .culture-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      min-height: 160px;
    }

    .culture-card .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 16px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
    }

    .culture-card .card-category {
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #e67e22;
      margin-bottom: 4px;
    }

    .culture-card h3 {
      font-family: Georgia, serif;
      font-size: 15px;
      font-weight: bold;
      line-height: 1.3;
      color: #fff;
    }

    .culture-card .card-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    /* ===== TENDENCIAS ===== */
    .trending-section {
      padding: 32px 0;
      background: #f9f9f9;
      border-top: 1px solid #ddd;
    }

    .trending-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .trending-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 2px;
    }

    .trending-item:hover { border-color: #e67e22; }

    .trending-item .trend-rank {
      font-family: Georgia, serif;
      font-size: 24px;
      font-weight: bold;
      color: #e67e22;
      min-width: 32px;
      text-align: center;
    }

    .trending-item .trend-content { flex: 1; }

    .trending-item h3 {
      font-size: 13px;
      font-weight: bold;
      line-height: 1.35;
      color: #333;
      margin-bottom: 2px;
    }

    .trending-item .trend-meta {
      font-size: 11px;
      color: #999;
    }

    .trending-item .trend-thumb {
      width: 56px;
      height: 56px;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .trending-item .trend-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== FOOTER ===== */
    .site-footer {
      border-top: 2px solid #e67e22;
      padding: 24px 0;
      background: #fff;
      color: #999;
    }

    .footer-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .footer-nav {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
    }

    .footer-nav a {
      font-size: 12px;
      text-transform: uppercase;
      color: #999;
    }

    .footer-nav a:hover { color: #e67e22; }

    .footer-copy {
      font-size: 11px;
      color: #999;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .latest-grid { grid-template-columns: 1fr; }
      .music-grid { grid-template-columns: 1fr; }
      .culture-grid { grid-template-columns: 1fr; }
      .culture-card:first-child { grid-row: auto; }
      .trending-list { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .nav-links.active {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 56px;
        left: 0;
        right: 0;
        background: #fff;
        border-bottom: 1px solid #ddd;
        z-index: 99;
      }
      .hero-overlay h2 { font-size: 20px; }
      .hero-overlay { padding: 20px 16px 14px; }
      .section-title { font-size: 18px; }
      .footer-nav { flex-wrap: wrap; gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="top-bar"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="site-logo"><a href="index.html">ALBA</a></div>
      <nav class="nav-links" id="navLinks">
        <a href="#musica">Música</a>
        <a href="#estilo">Estilo</a>
        <a href="#cultura">Cultura</a>
        <a href="#envivo">En Vivo</a>
      </nav>
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <section class="hero-section">
    <div class="container">
      {{HERO_CARD}}
    </div>
  </section>

  <section class="latest-section">
    <div class="container">
      <h2 class="section-title">Lo Último</h2>
      <div class="latest-grid">
        {{LATEST_ARTICLES}}
      </div>
    </div>
  </section>

  <section class="music-section" id="musica">
    <div class="container">
      <h2 class="section-title">Música</h2>
      <div class="music-grid">
        {{MUSIC_ARTICLES}}
      </div>
    </div>
  </section>

  <section class="culture-section" id="cultura">
    <div class="container">
      <h2 class="section-title">Cultura</h2>
      <div class="culture-grid">
        {{CULTURE_ARTICLES}}
      </div>
    </div>
  </section>

  <section class="trending-section">
    <div class="container">
      <h2 class="section-title">Tendencias</h2>
      <div class="trending-list">
        {{TRENDING}}
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-nav">
        <a href="#musica">Música</a>
        <a href="#estilo">Estilo</a>
        <a href="#cultura">Cultura</a>
        <a href="#envivo">En Vivo</a>
        <a href="#">Contacto</a>
        <a href="#">Acerca de</a>
      </div>
      <p class="footer-copy">&copy; 2019-2026 ALBA. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script>
    var btn = document.getElementById('hamburgerBtn');
    var nav = document.getElementById('navLinks');
    if (btn && nav) {
      btn.addEventListener('click', function() {
        nav.classList.toggle('active');
      });
    }
  </script>

</body>
</html>
